# Porta do servidor (altere se necessário)
server.port=8080

# Aumenta o limite de upload para receber JSONs grandes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Diretório onde os PDFs gerados serão armazenados (dentro do container)
canvas.storage.path=/app/pdf-storage

# URL pública base para montar o link de download enviado via WhatsApp
# Altere para o IP local da sua máquina se precisar acessar pelo celular
# Exemplo: canvas.public.url=http://192.168.1.100:8080
canvas.public.url=http://192.168.18.11:8080

# Log do openhtmltopdf (pode desativar em produção)
logging.level.com.openhtmltopdf=WARN
logging.level.com.canvas=INFO
